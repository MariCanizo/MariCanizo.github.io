<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marina Cañizo | Data Analyst & Storyteller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Montserrat", sans-serif;
      color: #fff;
      background: #0a3d4a;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: opacity 0.25s ease;
    }

    a:hover {
      opacity: 0.75;
    }

    .page {
      min-height: 100vh;
      background: url("hero-bg.png") center / cover no-repeat;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.5rem 4rem;
      position: relative;
      z-index: 2;
    }

    .logo {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    .nav {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 0.35rem;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%) scale(0);
      transition: transform 0.25s ease;
    }

    .nav a:hover::after,
    .nav a:focus-visible::after {
      transform: translateX(-50%) scale(1);
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 4rem 6rem;
      max-width: 52rem;
      position: relative;
      z-index: 2;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .hero-name {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .hero-role {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .hero-role a:hover {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 0.35em;
    }

    .hero-taglines {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
      font-weight: 400;
      line-height: 1.65;
      margin-top: 0.75rem;
      max-width: 28rem;
    }

    .hero-taglines a {
      display: inline;
    }

    .hero-taglines a:hover {
      opacity: 1;
      font-style: italic;
    }

    .hero-taglines em {
      font-style: italic;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding: 0.85rem 1.75rem;
      border: 1px solid rgba(255, 255, 255, 0.85);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      width: fit-content;
      transition: background 0.3s ease, opacity 0.25s ease;
    }

    .cta-btn:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.12);
    }

    .cta-btn .arrow {
      font-size: 0.9rem;
      transition: transform 0.25s ease;
    }

    .cta-btn:hover .arrow {
      transform: translateX(4px);
    }

    /* Placeholder sections for nav targets */
    .section-placeholder {
      scroll-margin-top: 2rem;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1.5rem;
        padding: 2rem 1.5rem;
      }

      .nav {
        gap: 1.25rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero {
        padding: 2rem 1.5rem 4rem;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <header class="header">
      <a href="#home" class="logo" aria-label="Marina Cañizo — Home">MC</a>
      <nav aria-label="Main navigation">
        <ul class="nav">
          <li><a href="#about">About</a></li>
          <li><a href="#work">Work</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="mailto:marinacanizo@gmail.com">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="home" class="hero section-placeholder">
      <div class="hero-inner">
        <h1 class="hero-name">
          <a href="#about">Marina Cañizo</a>
        </h1>
        <p class="hero-role">
          <a href="#about">Data Analyst &amp; Storyteller</a>
        </p>
        <p class="hero-taglines">
          <a href="#services">Turning data into clarity.</a><br>
          <a href="#services">Insights that <em>inspire</em> confident decisions.</a>
        </p>
        <a href="#work" class="cta-btn">
          View My Work <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </main>
  </div>

</body>
</html>
