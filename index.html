<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marina Cañizo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: url("hero-bg.png") center / cover no-repeat;
      color: #fff;
      font-family: "Montserrat", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2.5rem 4rem 4rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    .nav {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: opacity 0.25s ease;
    }

    .nav a:hover {
      opacity: 0.7;
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding-top: 2rem;
      padding-left: clamp(2rem, 10vw, 8rem);
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .hero-intro {
      display: flex;
      align-items: center;
      gap: clamp(1.5rem, 4vw, 3rem);
    }

    .hero-name {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.5rem, 8.5vw, 6.75rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .hero-name a {
      display: block;
    }

    /* Bubble portrait effect */
    .portrait-card {
      position: relative;
      width: clamp(140px, 18vw, 200px);
      height: clamp(140px, 18vw, 200px);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portrait-glow {
      position: absolute;
      inset: -5%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, rgba(200, 220, 230, 0.15) 50%, transparent 70%);
      filter: blur(20px);
      z-index: 1;
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }

    .portrait-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      border: 3px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      z-index: 2;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      animation: morphShape 12s ease-in-out infinite alternate;
      transition: border-color 0.3s ease;
    }

    .portrait-card:hover .portrait-frame {
      border-color: rgba(255, 255, 255, 0.7);
    }

    .portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .portrait-card:hover .portrait-img {
      transform: scale(1.05);
    }

    @keyframes morphShape {
      0%   { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      50%  { border-radius: 50% 60% 40% 50% / 40% 60% 50% 60%; }
      100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
    }

    @keyframes pulseGlow {
      0%   { transform: scale(0.95); opacity: 0.8; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    .hero-role {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .hero-tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
      font-weight: 400;
      line-height: 1.65;
      margin-top: 0.75rem;
      max-width: 28rem;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding: 0.85rem 1.75rem;
      border: 1px solid rgba(255, 255, 255, 0.85);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      width: fit-content;
      transition: background 0.3s ease, opacity 0.25s ease;
    }

    .cta-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .cta-btn .arrow {
      font-size: 0.9rem;
      transition: transform 0.25s ease;
    }

    .cta-btn:hover .arrow {
      transform: translateX(4px);
    }

    @media (max-width: 768px) {
      .page {
        padding: 2rem 1.5rem 3rem;
      }

      .header {
        flex-direction: column;
        gap: 1.5rem;
      }

      .nav {
        gap: 1.25rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero {
        padding-left: 0;
      }

      .hero-intro {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <header class="header">
      <a href="#home" class="logo">MC</a>
      <nav aria-label="Main navigation">
        <ul class="nav">
          <li><a href="#about">About</a></li>
          <li><a href="#work">Work</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="home" class="hero">
      <div class="hero-inner">
        <div class="hero-intro">
          <h1 class="hero-name">
            <a href="#about">Marina</a>
            <a href="#about">Cañizo</a>
          </h1>
          <div class="portrait-card">
            <div class="portrait-glow"></div>
            <div class="portrait-frame">
              <img src="profile.png" alt="Marina Cañizo" class="portrait-img">
            </div>
          </div>
        </div>
        <p class="hero-role">
          <a href="#about">Data Analyst</a>
        </p>
        <p class="hero-tagline">
          <a href="#services">Turning data I LIKE into clarity.</a>
        </p>
        <a href="#work" class="cta-btn">
          View My Work <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </main>
  </div>

</body>
</html>
